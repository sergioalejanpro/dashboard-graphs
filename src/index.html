<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard Reactivos</title>

    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/layout.css" />
    <link rel="stylesheet" href="./styles/sidebar.css" />
    <link rel="stylesheet" href="./styles/kpi.css" />
    <link rel="stylesheet" href="./styles/responsive.css" />
    <link rel="stylesheet" href="./styles/charts.css" />
  </head>
  <body>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <div class="app-layout">
      <aside class="sidebar">
        <button id="menu-toggle" class="menu-toggle">☰</button>

        <div class="logo-container">
          <img src="./assets/images/logo-white.png" />
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">Encuesta</div>

          <div id="survey-summary"></div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">Preguntas</div>

          <div id="questions-list"></div>
        </div>
      </aside>

      <main class="app-main">
        <section class="kpi-bar" id="kpi-bar"></section>

        <section class="dashboard-section">
          <div class="chart-card">
            <div class="chart-title" id="chart-title"></div>

            <div id="main-chart"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <script type="module" src="./modules/app.js"></script>
  </body>
</html>
